# Dragonking's Tech Blog Configuration
title: Dragonking的博客
email: dragonkingwhd@gmail.com
description: >-
  天下英雄如过江之鲫

baseurl: ""
url: "https://dragonkingai.com"

# 构建设置
markdown: kramdown
highlighter: rouge
permalink: /:categories/:year/:month/:day/:title:output_ext

# 插件
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# 排除文件
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor/

# 作者信息
author:
  name: Dragonking
  email: dragonkingwhd@gmail.com
  github: DragonKingwhd

# 导航菜单
navigation:
  - title: 博客
    url: /blog/
    icon: "fas fa-pen-fancy"
  - title: 知识库
    url: /docs/
    icon: "fas fa-book"
  - title: 工具
    url: /tools/
    icon: "fas fa-tools"
  - title: 浮生日记
    url: /floating-diary/
    icon: "fas fa-feather"
  - title: 期刊订阅
    url: /journals/
    icon: "fas fa-rss"
  - title: 留言板
    url: /guestbook/
    icon: "fas fa-comments"

# 社交链接
social:
  github: DragonKingwhd
  email: dragonkingwhd@gmail.com

# giscus 评论系统（基于 GitHub Discussions，无需在前端暴露任何密钥）
# 配置步骤见 README 或 https://giscus.app
giscus:
  enable: true
  repo: 'DragonKingwhd/dragonkingwhd.github.io'   # owner/repo
  repo_id: 'R_kgDOPlOpOg'                         # 从 giscus.app 获取
  category: 'Comments'                            # GitHub Discussions 分类名
  category_id: 'DIC_kwDOPlOpOs4C9Glf'             # 从 giscus.app 获取
  mapping: 'pathname'                             # 每个页面路径对应一个 discussion
  reactions_enabled: '1'
  theme: 'light'
  lang: 'zh-CN'

# 网站主题配置
theme_config:
  primary_color: "#00d4ff"
  secondary_color: "#ff6b6b"
  dark_bg: "#0a0e27"
  light_text: "#ffffff"
  code_bg: "#1e1e2e"

# Collections
collections:
  skills:
    output: true
    permalink: /:collection/:name/
  docs:
    output: true
    permalink: /:collection/:name/
  diary_posts:
    output: true
    permalink: /diary/:year/:month/:day/:title/

# 默认设置
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Dragonking"
  - scope:
      path: ""
      type: "skills"
    values:
      layout: "skill"
  - scope:
      path: ""
      type: "docs"
    values:
      layout: "doc"
  - scope:
      path: ""
      type: "diary_posts"
    values:
      layout: "diary"
      author: "Dragonking"