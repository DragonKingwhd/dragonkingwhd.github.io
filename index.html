<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragonking's Blog</title>
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
            font-family: 'Noto Sans SC', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #e0e0e0;
        }

        .container {
            max-width: 1000px;
            width: 90%;
            text-align: center;
        }

        .header {
            margin-bottom: 80px;
        }

        .title {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 16px;
            color: #999;
            letter-spacing: 2px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-bottom: 60px;
        }

        .card {
            padding: 60px 40px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .card:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: #00d4ff;
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 212, 255, 0.15);
        }

        .card-icon {
            font-size: 48px;
            color: #00d4ff;
        }

        .card-title {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
        }

        .card-description {
            font-size: 14px;
            color: #999;
            line-height: 1.6;
        }

        .footer {
            color: #666;
            font-size: 12px;
            letter-spacing: 1px;
        }

        /* Fortune Banner */
        .fortune-banner {
            display: block;
            text-decoration: none;
            color: inherit;
            margin-bottom: 50px;
            padding: 28px 40px;
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.15), rgba(168, 85, 247, 0.08));
            border: 1px solid rgba(124, 58, 237, 0.35);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .fortune-banner::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 14px;
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.4), transparent 40%, transparent 60%, rgba(168, 85, 247, 0.4));
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .fortune-banner:hover::before { opacity: 1; }

        .fortune-banner:hover {
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.25), rgba(168, 85, 247, 0.15));
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(124, 58, 237, 0.2);
        }

        .fortune-banner-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
        }

        .fortune-sticks-icon {
            width: 48px;
            height: 48px;
            position: relative;
            flex-shrink: 0;
        }

        .fortune-stick {
            position: absolute;
            bottom: 6px;
            width: 4px;
            height: 32px;
            border-radius: 2px;
            transform-origin: bottom center;
        }

        .fortune-stick:nth-child(1) { left: 14px; background: #a855f7; animation: stickShake1 2.5s ease-in-out infinite; }
        .fortune-stick:nth-child(2) { left: 20px; background: #c084fc; animation: stickShake2 2.5s ease-in-out infinite 0.15s; height: 36px; }
        .fortune-stick:nth-child(3) { left: 26px; background: #7c3aed; animation: stickShake3 2.5s ease-in-out infinite 0.3s; }
        .fortune-stick:nth-child(4) { left: 32px; background: #a855f7; animation: stickShake1 2.5s ease-in-out infinite 0.1s; height: 30px; }

        .fortune-cup {
            position: absolute;
            bottom: 0;
            left: 8px;
            width: 32px;
            height: 18px;
            border: 2px solid #a855f7;
            border-top: none;
            border-radius: 0 0 8px 8px;
            background: rgba(124, 58, 237, 0.2);
        }

        @keyframes stickShake1 { 0%,100% { transform: rotate(-3deg); } 50% { transform: rotate(4deg); } }
        @keyframes stickShake2 { 0%,100% { transform: rotate(2deg); } 50% { transform: rotate(-5deg); } }
        @keyframes stickShake3 { 0%,100% { transform: rotate(-4deg); } 50% { transform: rotate(3deg); } }

        .fortune-text { text-align: left; }

        .fortune-title {
            font-size: 22px;
            font-weight: 700;
            color: #d8b4fe;
            margin-bottom: 4px;
        }

        .fortune-subtitle {
            font-size: 11px;
            color: #a78bfa;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .fortune-arrow {
            font-size: 20px;
            color: #a855f7;
            transition: transform 0.3s ease;
            flex-shrink: 0;
        }

        .fortune-banner:hover .fortune-arrow { transform: translateX(5px); }

        @media (max-width: 768px) {
            .fortune-banner { padding: 20px 24px; margin-bottom: 30px; }
            .fortune-title { font-size: 18px; }
            .fortune-subtitle { font-size: 10px; letter-spacing: 3px; }
            .fortune-sticks-icon { width: 40px; height: 40px; }

            .grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .title {
                font-size: 32px;
            }

            .card {
                padding: 40px 20px;
            }

            .card-icon {
                font-size: 36px;
            }

            .card-title {
                font-size: 18px;
            }
        }
    </style>
</head>
