<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragonking's Blog</title>
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
            font-family: 'Noto Sans SC', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #e0e0e0;
        }

        .container {
            max-width: 1000px;
            width: 90%;
            text-align: center;
        }

        .header {
            margin-bottom: 80px;
        }

        .title {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 16px;
            color: #999;
            letter-spacing: 2px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-bottom: 60px;
        }

        .card {
            padding: 60px 40px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .card:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: #00d4ff;
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 212, 255, 0.15);
        }

        .card-icon {
            font-size: 48px;
            color: #00d4ff;
        }

        .card-title {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
        }

        .card-description {
            font-size: 14px;
            color: #999;
            line-height: 1.6;
        }

        .footer {
            color: #666;
            font-size: 12px;
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .title {
                font-size: 32px;
            }

            .card {
                padding: 40px 20px;
            }

            .card-icon {
                font-size: 36px;
            }

            .card-title {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">Dragonking</div>
            <div class="subtitle">技术博客 | 工具分享 | 日记留言</div>
        </div>

        <div class="grid">
            <a href="/blog/" class="card">
                <div class="card-icon">📚</div>
                <div class="card-title">知识文章</div>
                <div class="card-description">技术分享与思考</div>
            </a>

            <a href="/tools/" class="card">
                <div class="card-icon">🛠️</div>
                <div class="card-title">实用工具</div>
                <div class="card-description">开发辅助工具集</div>
            </a>

            <a href="/floating-diary/" class="card">
                <div class="card-icon">✍️</div>
                <div class="card-title">浮生日记</div>
                <div class="card-description">生活与思考的记录</div>
            </a>

            <a href="/guestbook/" class="card">
                <div class="card-icon">💬</div>
                <div class="card-title">留言板</div>
                <div class="card-description">欢迎交流和反馈</div>
            </a>
        </div>

        <div class="footer">© 2024-<script>document.write(new Date().getFullYear())</script> Dragonking | Powered by Jekyll</div>
    </div>
