<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>词汇闪卡 — 中英混合记忆</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf6f0;
    --card-bg: #fffdf9;
    --card-back-bg: #f5efe6;
    --border: #e8dfd2;
    --brown-dark: #3d2b1f;
    --brown: #6b4c35;
    --brown-mid: #8c6d52;
    --brown-light: #b09678;
    --accent: #c0522e;
    --green: #4a7c59;
    --green-bg: rgba(74,124,89,0.07);
    --accent-bg: rgba(192,82,46,0.07);
    --text: #3d2b1f;
    --text-dim: #9c8b7a;
    --shadow: rgba(61,43,31,0.06);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', 'Noto Serif SC', sans-serif; min-height: 100vh; }
  .header { text-align: center; padding: 36px 20px 8px; }
  .header h1 { font-family: 'Playfair Display', 'Noto Serif SC', serif; font-size: clamp(1.5rem, 4vw, 2.2rem); color: var(--brown-dark); font-weight: 700; }
  .header p { color: var(--text-dim); font-size: 0.72rem; margin-top: 5px; letter-spacing: 3px; text-transform: uppercase; font-weight: 500; }
  .stats-bar { display: flex; justify-content: center; gap: 32px; padding: 16px 20px; }
  .stat { text-align: center; }
  .stat-num { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--brown); }
  .stat-num.green { color: var(--green); }
  .stat-label { font-size: 0.58rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; margin-top: 2px; font-weight: 600; }
  .progress-container { max-width: 600px; margin: 0 auto 16px; padding: 0 28px; }
  .progress-track { height: 2px; background: var(--border); border-radius: 1px; }
  .progress-fill { height: 100%; background: var(--brown-light); border-radius: 1px; transition: width 0.4s ease; }
  .progress-text { font-size: 0.62rem; color: var(--text-dim); margin-top: 4px; text-align: right; font-weight: 500; }
  .search-row { max-width: 600px; margin: 0 auto 12px; padding: 0 28px; }
  .search-input { width: 100%; padding: 8px 14px; border: 1.5px solid var(--border); border-radius: 10px; background: var(--card-bg); font-family: 'DM Sans', sans-serif; font-size: 0.82rem; color: var(--text); outline: none; transition: border-color 0.2s; }
  .search-input:focus { border-color: var(--brown-light); }
  .search-input::placeholder { color: var(--text-dim); }
  .filter-tabs { display: flex; justify-content: center; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-tab { font-family: 'DM Sans', sans-serif; font-size: 0.68rem; font-weight: 600; padding: 4px 12px; border-radius: 14px; border: 1.5px solid var(--border); background: transparent; color: var(--text-dim); cursor: pointer; transition: all 0.2s; }
  .filter-tab:hover { border-color: var(--brown-light); color: var(--brown); }
  .filter-tab.active { background: var(--brown); color: #fff; border-color: var(--brown); }
  .card-container { max-width: 600px; margin: 0 auto; padding: 0 20px 12px; perspective: 1000px; }
  .card-flip { width: 100%; min-height: 260px; cursor: pointer; position: relative; transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
  .card-flip.flipped { transform: rotateY(180deg); }
  .card-face { position: absolute; top: 0; left: 0; right: 0; bottom: 0; backface-visibility: hidden; border-radius: 14px; padding: 30px 26px; display: flex; flex-direction: column; justify-content: center; }
  .card-front { background: var(--card-bg); border: 1.5px solid var(--border); box-shadow: 0 1px 12px var(--shadow); }
  .card-back { background: var(--card-back-bg); border: 1.5px solid var(--border); transform: rotateY(180deg); box-shadow: 0 1px 12px var(--shadow); }
  .side-label { position: absolute; top: 12px; right: 14px; font-size: 0.58rem; font-weight: 700; letter-spacing: 2px; padding: 2px 8px; border-radius: 8px; }
  .card-front .side-label { color: var(--accent); background: var(--accent-bg); }
  .card-back .side-label { color: var(--green); background: var(--green-bg); }
  .word-row { display: flex; align-items: center; gap: 10px; margin-bottom: 2px; }
  .word-title { font-family: 'Playfair Display', serif; font-size: 1.9rem; color: var(--brown-dark); line-height: 1.1; }
  .speak-btn { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid var(--border); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
  .speak-btn:hover { background: var(--brown); border-color: var(--brown); }
  .speak-btn:hover svg { stroke: #fff; }
  .speak-btn svg { width: 13px; height: 13px; stroke: var(--brown-mid); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .word-phonetic { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 2px; }
  .word-meaning { font-size: 0.75rem; color: var(--brown-mid); margin-bottom: 18px; font-family: 'Noto Serif SC', serif; }
  .sentence { font-size: 0.98rem; line-height: 2.1; font-family: 'Noto Serif SC', 'DM Sans', serif; }
  .sentence .en { font-family: 'DM Sans', sans-serif; font-weight: 700; color: var(--accent); background: var(--accent-bg); padding: 1px 4px; border-radius: 3px; }
  .sentence .cn { font-family: 'Noto Serif SC', serif; font-weight: 700; color: var(--green); background: var(--green-bg); padding: 1px 4px; border-radius: 3px; }
  .tap-hint { text-align: center; margin-top: 8px; font-size: 0.6rem; color: var(--text-dim); opacity: 0.4; font-weight: 500; }
  .toggle-full { display: block; margin: 10px auto 0; font-family: 'DM Sans', sans-serif; font-size: 0.68rem; font-weight: 600; color: var(--brown-light); background: none; border: none; cursor: pointer; transition: color 0.2s; }
  .toggle-full:hover { color: var(--brown); }
  .full-sentences { max-width: 600px; margin: 0 auto; padding: 0 20px; overflow: hidden; transition: max-height 0.4s ease, opacity 0.3s ease; max-height: 0; opacity: 0; }
  .full-sentences.show { max-height: 300px; opacity: 1; }
  .full-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; margin-top: 10px; }
  .full-box-label { font-size: 0.58rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 4px; }
  .full-box p { font-size: 0.88rem; line-height: 1.7; color: var(--brown); }
  .full-box p.zh { font-family: 'Noto Serif SC', serif; }
  .full-box p.en-full { font-family: 'DM Sans', sans-serif; }
  .nav-row { display: flex; justify-content: center; align-items: center; gap: 8px; padding: 18px 20px 10px; }
  .nav-btn { font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.8rem; padding: 9px 20px; border: none; border-radius: 10px; cursor: pointer; transition: all 0.2s; }
  .nav-btn.prev { background: transparent; color: var(--brown-mid); border: 1.5px solid var(--border); }
  .nav-btn.prev:hover { border-color: var(--brown-light); color: var(--brown); }
  .nav-btn.next { background: var(--brown); color: #fff; }
  .nav-btn.next:hover { background: var(--brown-dark); transform: translateY(-1px); }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none !important; }
  .master-btn { font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.72rem; padding: 8px 14px; border-radius: 10px; border: 1.5px solid var(--green); background: transparent; color: var(--green); cursor: pointer; transition: all 0.2s; }
  .master-btn:hover { background: var(--green); color: #fff; }
  .master-btn.mastered { background: var(--green); color: #fff; }
  .shortcuts { text-align: center; padding: 4px 0 28px; font-size: 0.58rem; color: var(--text-dim); opacity: 0.4; }
  .shortcuts kbd { background: rgba(61,43,31,0.05); padding: 2px 5px; border-radius: 3px; border: 1px solid var(--border); font-family: 'DM Sans', sans-serif; font-size: 0.58rem; }
  @media (max-width: 600px) {
    .card-face { padding: 22px 18px; }
    .word-title { font-size: 1.5rem; }
    .sentence { font-size: 0.9rem; }
    .nav-btn { padding: 8px 16px; font-size: 0.76rem; }
  }

  /* ===== DAILY GOAL ===== */
  .daily-section { max-width: 600px; margin: 0 auto 8px; padding: 0 28px; display: flex; align-items: center; gap: 16px; }
  .daily-goal { position: relative; display: flex; align-items: center; gap: 14px; flex: 1; }
  .goal-ring-wrap { position: relative; width: 64px; height: 64px; flex-shrink: 0; }
  .goal-ring { width: 64px; height: 64px; transform: rotate(-90deg); }
  .goal-ring-bg { fill: none; stroke: var(--border); stroke-width: 4; }
  .goal-ring-fill { fill: none; stroke: var(--green); stroke-width: 4; stroke-linecap: round; stroke-dasharray: 213.6; stroke-dashoffset: 213.6; transition: stroke-dashoffset 0.6s ease; }
  .goal-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .goal-num { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--green); font-weight: 700; line-height: 1; }
  .goal-den { font-size: 0.55rem; color: var(--text-dim); font-weight: 600; }
  .goal-info { flex: 1; }
  .goal-title { font-size: 0.72rem; font-weight: 700; color: var(--brown); margin-bottom: 2px; }
  .goal-sub { font-size: 0.6rem; color: var(--text-dim); }
  .goal-setting-btn { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid var(--border); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
  .goal-setting-btn:hover { background: var(--brown); border-color: var(--brown); }
  .goal-setting-btn:hover svg { stroke: #fff; }
  .goal-setting-btn svg { width: 14px; height: 14px; stroke: var(--brown-mid); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .goal-picker { position: absolute; top: 100%; right: 0; margin-top: 6px; background: var(--card-bg); border: 1.5px solid var(--border); border-radius: 12px; padding: 8px; display: none; gap: 4px; z-index: 100; box-shadow: 0 4px 20px var(--shadow); }
  .goal-picker.show { display: flex; }
  .goal-picker button { font-family: 'DM Sans', sans-serif; font-size: 0.72rem; font-weight: 600; padding: 6px 12px; border: 1.5px solid var(--border); border-radius: 8px; background: transparent; color: var(--brown-mid); cursor: pointer; transition: all 0.2s; }
  .goal-picker button:hover, .goal-picker button.active { background: var(--brown); color: #fff; border-color: var(--brown); }
  .streak-badge { font-size: 0.65rem; font-weight: 600; color: var(--accent); background: var(--accent-bg); padding: 4px 10px; border-radius: 10px; white-space: nowrap; flex-shrink: 0; display: none; }

  /* ===== QUOTE ===== */
  .quote-section { max-width: 600px; margin: 0 auto 16px; padding: 14px 28px; text-align: center; background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px; max-width: 556px; }
  .quote-label { font-size: 0.55rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 10px; }
  .quote-words { font-family: 'Playfair Display', serif; font-size: 1rem; line-height: 1.9; color: var(--brown-dark); margin-bottom: 6px; min-height: 1.8em; }
  .qw { display: inline-block; transition: all 0.4s ease; margin: 0 1px; padding: 0 2px; }
  .qw.hidden { color: transparent; background: var(--border); border-radius: 3px; min-width: 1.2em; }
  .qw.revealing { animation: wordReveal 0.5s ease forwards; }
  @keyframes wordReveal {
    0% { color: transparent; background: var(--border); transform: scale(0.8); }
    50% { color: var(--green); background: var(--green-bg); transform: scale(1.1); }
    100% { color: var(--brown-dark); background: transparent; transform: scale(1); }
  }
  .quote-zh { font-family: 'Noto Serif SC', serif; font-size: 0.72rem; color: var(--text-dim); margin-bottom: 4px; transition: opacity 0.5s, max-height 0.5s; }
  .quote-zh.hidden { opacity: 0; max-height: 0; overflow: hidden; margin: 0; }
  .quote-author { font-size: 0.62rem; color: var(--brown-light); font-style: italic; transition: opacity 0.5s; }
  .quote-progress { font-size: 0.55rem; color: var(--text-dim); margin-top: 6px; }

  /* ===== TOAST ===== */
  .toast-container { position: fixed; top: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
  .toast { background: var(--card-bg); border: 1.5px solid var(--green); border-radius: 12px; padding: 10px 16px; box-shadow: 0 4px 20px rgba(61,43,31,0.12); animation: toastIn 0.3s ease, toastOut 0.3s ease 2s forwards; font-size: 0.78rem; font-weight: 600; color: var(--green); }
  @keyframes toastIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

  /* ===== CELEBRATION ===== */
  .celebration { position: fixed; inset: 0; z-index: 2000; display: none; align-items: center; justify-content: center; background: rgba(250,246,240,0.92); backdrop-filter: blur(6px); }
  .celebration.show { display: flex; animation: celeFadeIn 0.4s ease; }
  @keyframes celeFadeIn { from { opacity: 0; } to { opacity: 1; } }
  .cele-content { text-align: center; animation: celeBounce 0.5s ease; }
  @keyframes celeBounce { 0% { transform: scale(0.5); opacity: 0; } 60% { transform: scale(1.05); } 100% { transform: scale(1); opacity: 1; } }
  .cele-icon { font-size: 3.5rem; margin-bottom: 12px; }
  .cele-title { font-family: 'Playfair Display', 'Noto Serif SC', serif; font-size: 1.6rem; color: var(--brown-dark); font-weight: 700; margin-bottom: 8px; }
  .cele-sub { font-size: 0.82rem; color: var(--brown-mid); margin-bottom: 4px; font-family: 'Noto Serif SC', serif; }
  .cele-quote { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--green); margin: 14px 28px; font-style: italic; line-height: 1.6; }
  .cele-btn { margin-top: 18px; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.82rem; padding: 10px 28px; border: none; border-radius: 12px; background: var(--brown); color: #fff; cursor: pointer; transition: all 0.2s; }
  .cele-btn:hover { background: var(--brown-dark); transform: translateY(-1px); }
  #confettiCanvas { position: fixed; inset: 0; z-index: 2001; pointer-events: none; }

  /* Card mastered glow */
  .card-flip.mastered-anim { animation: cardGlow 0.6s ease; }
  @keyframes cardGlow {
    0% { filter: drop-shadow(0 0 0 rgba(74,124,89,0)); }
    50% { filter: drop-shadow(0 0 16px rgba(74,124,89,0.25)); }
    100% { filter: drop-shadow(0 0 0 rgba(74,124,89,0)); }
  }

  @media (max-width: 600px) {
    .daily-section { padding: 0 20px; gap: 12px; }
    .goal-ring-wrap, .goal-ring { width: 54px; height: 54px; }
    .goal-num { font-size: 0.95rem; }
    .quote-section { margin-left: 20px; margin-right: 20px; }
    .quote-words { font-size: 0.9rem; }
    .cele-title { font-size: 1.3rem; }
    .toast { font-size: 0.72rem; padding: 8px 12px; }
  }
</style>
</head>
<body>
<div class="header">
  <h1>词汇闪卡</h1>
  <p>中英混合 · 双向记忆 · 交叉引用</p>
</div>
<div class="stats-bar">
  <div class="stat"><div class="stat-num" id="currentNum">1</div><div class="stat-label">当前</div></div>
  <div class="stat"><div class="stat-num" id="totalNum">0</div><div class="stat-label">总数</div></div>
  <div class="stat"><div class="stat-num green" id="masteredNum">0</div><div class="stat-label">已掌握</div></div>
  <div class="stat"><div class="stat-num" id="todayStat" style="color:var(--accent)">0</div><div class="stat-label">今日</div></div>
</div>
<div class="progress-container">
  <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-text" id="progressText">1 / 0</div>
</div>
<div class="daily-section">
  <div class="daily-goal">
    <div class="goal-ring-wrap">
      <svg class="goal-ring" viewBox="0 0 80 80">
        <circle class="goal-ring-bg" cx="40" cy="40" r="34"/>
        <circle class="goal-ring-fill" id="goalRing" cx="40" cy="40" r="34"/>
      </svg>
      <div class="goal-center">
        <div class="goal-num" id="todayNum">0</div>
        <div class="goal-den">/ <span id="goalTarget">10</span></div>
      </div>
    </div>
    <div class="goal-info">
      <div class="goal-title">今日目标</div>
      <div class="goal-sub" id="goalSub">加油，开始第一个吧!</div>
    </div>
    <button class="goal-setting-btn" onclick="toggleGoalPicker(event)">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
    <div class="goal-picker" id="goalPicker">
      <button onclick="setDailyGoal(5)">5</button>
      <button onclick="setDailyGoal(10)">10</button>
      <button onclick="setDailyGoal(15)">15</button>
      <button onclick="setDailyGoal(20)">20</button>
      <button onclick="setDailyGoal(30)">30</button>
    </div>
  </div>
  <div class="streak-badge" id="streakBadge"></div>
</div>

<div class="quote-section">
  <div class="quote-label">今日名言</div>
  <div class="quote-words" id="quoteWords"></div>
  <div class="quote-zh hidden" id="quoteZh"></div>
  <div class="quote-author" id="quoteAuthor"></div>
  <div class="quote-progress" id="quoteProgress"></div>
</div>

<div class="search-row">
  <input class="search-input" id="searchInput" type="text" placeholder="搜索单词..." oninput="onSearch()">
</div>
<div class="filter-tabs">
  <button class="filter-tab active" onclick="setFilter('all',this)">全部</button>
  <button class="filter-tab" onclick="setFilter('unmastered',this)">未掌握</button>
  <button class="filter-tab" onclick="setFilter('mastered',this)">已掌握</button>
  <button class="filter-tab" id="shuffleBtn" onclick="toggleShuffle()">🔀 乱序</button>
</div>
<div id="mainArea">
  <div class="card-container">
    <div class="card-flip" id="cardFlip" onclick="flipCard(event)">
      <div class="card-face card-front">
        <span class="side-label">正面</span>
        <div class="word-row">
          <div class="word-title" id="frontWord"></div>
          <button class="speak-btn" onclick="speak(event)"><svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg></button>
        </div>
        <div class="word-phonetic" id="frontPhonetic"></div>
        <div class="word-meaning" id="frontMeaning"></div>
        <div class="sentence" id="frontSentence"></div>
      </div>
      <div class="card-face card-back">
        <span class="side-label">反面</span>
        <div class="word-row">
          <div class="word-title" id="backWord"></div>
          <button class="speak-btn" onclick="speak(event)"><svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg></button>
        </div>
        <div class="word-phonetic" id="backPhonetic"></div>
        <div class="word-meaning" id="backMeaning"></div>
        <div class="sentence" id="backSentence"></div>
      </div>
    </div>
    <div class="tap-hint">点击卡片翻转</div>
  </div>
  <button class="toggle-full" id="toggleBtn" onclick="toggleFull()">▼ 查看完整中英文</button>
  <div class="full-sentences" id="fullArea">
    <div class="full-box"><div class="full-box-label">完整中文</div><p class="zh" id="fullZh"></p></div>
    <div class="full-box" style="margin-top:6px"><div class="full-box-label">完整英文</div><p class="en-full" id="fullEn"></p></div>
  </div>
</div>
<div class="nav-row">
  <button class="nav-btn prev" id="prevBtn" onclick="prevCard()">← 上一个</button>
  <button class="master-btn" id="masterBtn" onclick="toggleMaster()">○ 标记掌握</button>
  <button class="nav-btn next" id="nextBtn" onclick="nextCard()">下一个 →</button>
</div>
<div class="shortcuts">
  <kbd>←</kbd> 上一个 <kbd>→</kbd> 下一个 <kbd>Space</kbd> 翻转 <kbd>M</kbd> 掌握 <kbd>S</kbd> 发音
</div>

<div class="toast-container" id="toastContainer"></div>
<canvas id="confettiCanvas"></canvas>
<div class="celebration" id="celebration">

// ==================== STATE ====================
let cards = [...allCards];
let idx = 0;
let filter = 'all';
let shuffled = false;
let mastered = JSON.parse(localStorage.getItem('vocab-mastered') || '{}');
let fullOpen = false;

// Daily state
const today = new Date().toISOString().slice(0,10);
let dailyGoal = parseInt(localStorage.getItem('vocab-daily-goal') || '10');
let todayData = JSON.parse(localStorage.getItem('vocab-today') || '{}');
if (todayData.date !== today) { todayData = {date:today, words:[], celebrated:false}; saveTodayData(); }
let streakData = JSON.parse(localStorage.getItem('vocab-streak') || '{"count":0,"lastDate":""}');

function saveTodayData() { localStorage.setItem('vocab-today', JSON.stringify(todayData)); }

// ==================== DAILY QUOTE ====================
function getDailyQuote() {
  const seed = parseInt(today.replace(/-/g,''));
  return quotes[seed % quotes.length];
}

function renderQuote() {
  const quote = getDailyQuote();
  const words = quote.en.split(' ');
  const todayCount = todayData.words.length;
  let revealCount;
  if (todayData.celebrated || todayCount >= dailyGoal) {
    revealCount = words.length;
  } else {
    revealCount = Math.floor(todayCount / dailyGoal * words.length);
  }
  const container = document.getElementById('quoteWords');
  container.innerHTML = words.map((w,i) =>
    '<span class="qw'+(i >= revealCount ? ' hidden' : '')+'">'+w+'</span>'
  ).join(' ');
  const zhEl = document.getElementById('quoteZh');
  zhEl.textContent = quote.zh;
  zhEl.classList.toggle('hidden', todayCount < dailyGoal && !todayData.celebrated);
  document.getElementById('quoteAuthor').textContent = (todayCount >= dailyGoal || todayData.celebrated) ? '— '+quote.author : '';
  document.getElementById('quoteProgress').textContent = todayCount < dailyGoal
    ? '掌握 '+todayCount+'/'+dailyGoal+' 个单词解锁完整名言'
    : '名言已解锁!';
}

function revealNextQuoteWords() {
  const quote = getDailyQuote();
  const words = quote.en.split(' ');
  const todayCount = todayData.words.length;
  const revealCount = Math.min(Math.floor(todayCount / dailyGoal * words.length), words.length);
  const prevCount = Math.min(Math.floor((todayCount-1) / dailyGoal * words.length), words.length);
  const spans = document.querySelectorAll('#quoteWords .qw');
  for (let i = prevCount; i < revealCount && i < spans.length; i++) {
    ((idx) => {
      setTimeout(() => { spans[idx].classList.remove('hidden'); spans[idx].classList.add('revealing'); }, (idx-prevCount)*150);
    })(i);
  }
}

// ==================== DAILY GOAL ====================
function renderDailyGoal() {
  const todayCount = todayData.words.length;
  document.getElementById('todayNum').textContent = todayCount;
  document.getElementById('goalTarget').textContent = dailyGoal;
  document.getElementById('todayStat').textContent = todayCount;
  const circ = 2 * Math.PI * 34;
  const progress = Math.min(todayCount / dailyGoal, 1);
  const ring = document.getElementById('goalRing');
  ring.style.strokeDasharray = circ;
  ring.style.strokeDashoffset = circ * (1-progress);
  if (progress >= 1) ring.style.stroke = '#4a7c59';
  const sub = document.getElementById('goalSub');
  if (todayCount === 0) sub.textContent = '加油，开始第一个吧!';
  else if (todayCount < dailyGoal) sub.textContent = '还差 '+(dailyGoal-todayCount)+' 个就达标啦';
  else sub.textContent = '太棒了，目标已达成!';
  document.querySelectorAll('.goal-picker button').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.textContent)===dailyGoal);
  });
  renderStreak();
}

function toggleGoalPicker(e) {
  e.stopPropagation();
  document.getElementById('goalPicker').classList.toggle('show');
}

function setDailyGoal(n) {
  dailyGoal = n;
  localStorage.setItem('vocab-daily-goal', n);
  document.getElementById('goalPicker').classList.remove('show');
  renderDailyGoal();
  renderQuote();
}

document.addEventListener('click', () => { document.getElementById('goalPicker').classList.remove('show'); });

// ==================== STREAK ====================
function renderStreak() {
  const badge = document.getElementById('streakBadge');
  if (streakData.count > 0 && streakData.lastDate === today) {
    badge.textContent = '\uD83D\uDD25 连续 '+streakData.count+' 天';
    badge.style.display = '';
  } else if (streakData.count > 0) {
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
    if (streakData.lastDate === yesterday.toISOString().slice(0,10)) {
      badge.textContent = '\uD83D\uDD25 连续 '+streakData.count+' 天';
      badge.style.display = '';
    } else { badge.style.display = 'none'; }
  } else { badge.style.display = 'none'; }
}

function updateStreak() {
  if (todayData.words.length === 0) return;
  if (streakData.lastDate === today) return;
  const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
  const yd = yesterday.toISOString().slice(0,10);
  if (streakData.lastDate === yd) streakData.count++;
  else streakData.count = 1;
  streakData.lastDate = today;
  localStorage.setItem('vocab-streak', JSON.stringify(streakData));
}

// ==================== TOAST ====================
function showToast(msg) {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// ==================== CELEBRATION ====================
function triggerCelebration() {
  if (todayData.celebrated) return;
  todayData.celebrated = true;
  saveTodayData();
  const quote = getDailyQuote();
  // Reveal all remaining quote words
  document.querySelectorAll('#quoteWords .qw.hidden').forEach((span,i) => {
    setTimeout(() => { span.classList.remove('hidden'); span.classList.add('revealing'); }, i*100);
  });
  setTimeout(() => {
    document.getElementById('quoteZh').classList.remove('hidden');
    document.getElementById('quoteAuthor').textContent = '— '+quote.author;
    document.getElementById('quoteProgress').textContent = '名言已解锁!';
  }, 500);
  setTimeout(() => {
    document.getElementById('celeSub').textContent = '你今天掌握了 '+todayData.words.length+' 个单词';
    document.getElementById('celeQuote').textContent = '"'+quote.en+'" — '+quote.author;
    document.getElementById('celebration').classList.add('show');
    launchConfetti();
  }, 800);
}

function closeCelebration() {
  document.getElementById('celebration').classList.remove('show');
}

// ==================== CONFETTI ====================
function launchConfetti() {
  const canvas = document.getElementById('confettiCanvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const colors = ['#c0522e','#4a7c59','#6b4c35','#b09678','#e8dfd2','#d4a574'];
  const pieces = [];
  for (let i = 0; i < 120; i++) {
    pieces.push({
      x: Math.random()*canvas.width, y: -20-Math.random()*200,
      w: 6+Math.random()*6, h: 4+Math.random()*4,
      color: colors[Math.floor(Math.random()*colors.length)],
      vy: 2+Math.random()*3, vx: (Math.random()-0.5)*3,
      rot: Math.random()*360, rs: (Math.random()-0.5)*10, opacity: 1
    });
  }
  let frame = 0;
  function animate() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let alive = false;
    pieces.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.rot += p.rs;
      if (frame > 80) p.opacity -= 0.015;
      if (p.opacity <= 0) return;
      alive = true;
      ctx.save();
      ctx.translate(p.x,p.y);
      ctx.rotate(p.rot*Math.PI/180);
      ctx.globalAlpha = Math.max(0,p.opacity);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
    });
    frame++;
    if (alive && frame < 200) requestAnimationFrame(animate);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  animate();
}

// ==================== FILTER / SEARCH ====================
function applyFilter() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let base = allCards;
  if (filter === 'mastered') base = allCards.filter(c => mastered[c.word]);
  else if (filter === 'unmastered') base = allCards.filter(c => !mastered[c.word]);
  if (q) base = base.filter(c => c.word.toLowerCase().includes(q) || c.meaning.includes(q));
  cards = shuffled ? shuffle([...base]) : [...base];
  idx = 0;
  render();
}

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  applyFilter();
}

function onSearch() { applyFilter(); }

function toggleShuffle() {
  shuffled = !shuffled;
  document.getElementById('shuffleBtn').classList.toggle('active', shuffled);
  applyFilter();
}

function shuffle(arr) {
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

// ==================== RENDER ====================
function render() {
  const total = cards.length;
  const masteredCount = Object.keys(mastered).length;
  document.getElementById('totalNum').textContent = total;
  document.getElementById('masteredNum').textContent = masteredCount;
  document.getElementById('currentNum').textContent = total ? idx+1 : 0;
  document.getElementById('progressText').textContent = (total ? idx+1 : 0)+' / '+total;
  document.getElementById('progressFill').style.width = total ? ((idx+1)/total*100)+'%' : '0%';
  document.getElementById('prevBtn').disabled = idx <= 0;
  document.getElementById('nextBtn').disabled = idx >= total-1;

  document.getElementById('cardFlip').classList.remove('flipped');
  fullOpen = false;
  document.getElementById('fullArea').classList.remove('show');
  document.getElementById('toggleBtn').textContent = '▼ 查看完整中英文';

  if (!total) {
    ['frontWord','frontPhonetic','frontMeaning','backWord','backPhonetic','backMeaning'].forEach(id => document.getElementById(id).textContent = '');
    ['frontSentence','backSentence'].forEach(id => document.getElementById(id).innerHTML = '');
    document.getElementById('fullZh').textContent = '';
    document.getElementById('fullEn').textContent = '';
    document.getElementById('masterBtn').textContent = '○ 标记掌握';
    document.getElementById('masterBtn').classList.remove('mastered');
    return;
  }
  const c = cards[idx];
  document.getElementById('frontWord').textContent = c.word;
  document.getElementById('frontPhonetic').textContent = c.phonetic;
  document.getElementById('frontMeaning').textContent = c.meaning;
  document.getElementById('frontSentence').innerHTML = c.front;
  document.getElementById('backWord').textContent = c.word;
  document.getElementById('backPhonetic').textContent = c.phonetic;
  document.getElementById('backMeaning').textContent = c.meaning;
  document.getElementById('backSentence').innerHTML = c.back;
  document.getElementById('fullZh').textContent = c.fullZh;
  document.getElementById('fullEn').textContent = c.fullEn;

  if (mastered[c.word]) {
    document.getElementById('masterBtn').textContent = '● 已掌握';
    document.getElementById('masterBtn').classList.add('mastered');
  } else {
    document.getElementById('masterBtn').textContent = '○ 标记掌握';
    document.getElementById('masterBtn').classList.remove('mastered');
  }
}

// ==================== CARD ACTIONS ====================
function flipCard(e) {
  if (e.target.closest('.speak-btn')) return;
  document.getElementById('cardFlip').classList.toggle('flipped');
}

function speak(e) {
  e.stopPropagation();
  if (!cards.length) return;
  const u = new SpeechSynthesisUtterance(cards[idx].word);
  u.lang = 'en-US';
  speechSynthesis.speak(u);
}

function prevCard() { if (idx > 0) { idx--; render(); } }
function nextCard() { if (idx < cards.length-1) { idx++; render(); } }

function toggleMaster() {
  if (!cards.length) return;
  const w = cards[idx].word;

  if (mastered[w]) {
    // Unmaster
    delete mastered[w];
    todayData.words = todayData.words.filter(x => x !== w);
    saveTodayData();
  } else {
    // Master with celebration
    mastered[w] = true;
    if (!todayData.words.includes(w)) {
      todayData.words.push(w);
      saveTodayData();
      // Card glow
      const card = document.getElementById('cardFlip');
      card.classList.add('mastered-anim');
      setTimeout(() => card.classList.remove('mastered-anim'), 600);
      // Toast
      showToast('✓ '+w+' 已掌握 ('+todayData.words.length+'/'+dailyGoal+')');
      // Reveal quote words
      revealNextQuoteWords();
      // Update streak
      updateStreak();
      // Check daily goal
      if (todayData.words.length === dailyGoal) {
        setTimeout(() => triggerCelebration(), 700);
      }
    }
  }
  localStorage.setItem('vocab-mastered', JSON.stringify(mastered));
  renderDailyGoal();
  renderQuote();
  render();
}

function toggleFull() {
  fullOpen = !fullOpen;
  document.getElementById('fullArea').classList.toggle('show', fullOpen);
  document.getElementById('toggleBtn').textContent = fullOpen ? '▲ 收起完整中英文' : '▼ 查看完整中英文';
}

// ==================== KEYBOARD ====================
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (document.getElementById('celebration').classList.contains('show')) {
    if (e.key === 'Escape' || e.key === 'Enter') closeCelebration();
    return;
  }
  switch (e.key) {
    case 'ArrowLeft': prevCard(); break;
    case 'ArrowRight': nextCard(); break;
    case ' ': e.preventDefault(); document.getElementById('cardFlip').classList.toggle('flipped'); break;
    case 'm': case 'M': toggleMaster(); break;
    case 's': case 'S': speak(new Event('click')); break;
  }
});

// ==================== INIT ====================
function init() {
  applyFilter();
  renderDailyGoal();
  renderQuote();
  render();
}
init();
</script>
