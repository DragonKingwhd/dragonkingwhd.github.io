<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python第二章 - 基础语法</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface2: #1a1a25;
  --border: #2a2a3a;
  --text: #e8e6f0;
  --text-dim: #8888a0;
  --accent: #ff6b35;
  --accent2: #ff9a5c;
  --green: #4ecdc4;
  --green-dim: #2a7a74;
  --red: #ff6b6b;
  --yellow: #ffd93d;
  --code-bg: #0d0d15;
  --correct: #1a3a2a;
  --wrong: #3a1a1a;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans SC', sans-serif;
  line-height: 1.8;
  overflow-x: hidden;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

/* Header */
.header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  background: rgba(10, 10, 15, 0.9);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 16px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.header-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 1px;
}

.progress-bar {
  width: 200px;
  height: 4px;
  background: var(--surface2);
  border-radius: 2px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 2px;
  transition: width 0.5s ease;
  width: 0%;
}

.score-display {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  color: var(--green);
}

/* Navigation */
.nav {
  position: fixed;
  left: 0;
  top: 57px;
  bottom: 0;
  width: 260px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  z-index: 90;
  padding: 20px 0;
}

.nav-item {
  padding: 10px 24px;
  font-size: 13px;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.3s;
  border-left: 3px solid transparent;
  display: flex;
  align-items: center;
  gap: 10px;
}

.nav-item:hover {
  background: var(--surface2);
  color: var(--text);
}

.nav-item.active {
  color: var(--accent);
  border-left-color: var(--accent);
  background: rgba(255, 107, 53, 0.05);
}

.nav-item .status {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--border);
  flex-shrink: 0;
}

.nav-item .status.done {
  background: var(--green);
}

/* Main Content */
.main {
  margin-left: 260px;
  margin-top: 57px;
  padding: 40px 60px 100px;
  max-width: 900px;
}

/* Sections */
.section {
  display: none;
  animation: fadeIn 0.4s ease;
}

.section.active {
  display: block;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.section-number {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--accent);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.section h2 {
  font-size: 28px;
  font-weight: 900;
  margin-bottom: 8px;
  background: linear-gradient(135deg, var(--text), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.section .subtitle {
  color: var(--text-dim);
  font-size: 14px;
  margin-bottom: 32px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
}

.section h3 {
  font-size: 18px;
  font-weight: 700;
  margin: 28px 0 12px;
  color: var(--accent2);
}

.section p {
  margin-bottom: 16px;
  color: var(--text);
  font-size: 15px;
}

.highlight {
  color: var(--accent);
  font-weight: 500;
}

.analogy {
  background: var(--surface2);
  border-left: 3px solid var(--yellow);
  padding: 14px 18px;
  margin: 16px 0;
  border-radius: 0 8px 8px 0;
  font-size: 14px;
  color: var(--text-dim);
}

.analogy::before {
  content: "🔧 机械类比";
  display: block;
  font-size: 12px;
  font-weight: 700;
  color: var(--yellow);
  margin-bottom: 6px;
  letter-spacing: 1px;
}

/* Code blocks */
.code-block {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 18px 20px;
  margin: 14px 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  line-height: 1.7;
  overflow-x: auto;
  position: relative;
}

.code-block .comment { color: #6a6a80; }
.code-block .keyword { color: #c792ea; }
.code-block .string { color: #c3e88d; }
.code-block .number { color: #f78c6c; }
.code-block .func { color: #82aaff; }
.code-block .var { color: #e8e6f0; }
.code-block .op { color: #89ddff; }

/* Exercise area */
.exercise-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  margin: 24px 0;
}

.exercise-box .exercise-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--green);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 12px;
}

.exercise-box .exercise-question {
  font-size: 15px;
  margin-bottom: 16px;
}

.exercise-input {
  width: 100%;
  background: var(--code-bg);
  border: 2px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  color: var(--text);
  outline: none;
  transition: border-color 0.3s;
}

.exercise-input:focus {
  border-color: var(--accent);
}

.exercise-input::placeholder {
  color: #444;
}

.btn-check {
  margin-top: 12px;
  padding: 10px 28px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.3s;
  font-family: 'Noto Sans SC', sans-serif;
}

.btn-check:hover {
  background: var(--accent2);
  transform: translateY(-1px);
}

.feedback {
  margin-top: 12px;
  padding: 12px 16px;
  border-radius: 8px;
  font-size: 14px;
  display: none;
  animation: fadeIn 0.3s ease;
}

.feedback.correct {
  display: block;
  background: var(--correct);
  border: 1px solid var(--green-dim);
  color: var(--green);
}

.feedback.wrong {
  display: block;
  background: var(--wrong);
  border: 1px solid #5a2a2a;
  color: var(--red);
}

.feedback .answer-reveal {
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid rgba(255,255,255,0.1);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--text-dim);
}

/* Multiple choice */
.mc-options {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin: 12px 0;
}

.mc-option {
  padding: 12px 16px;
  background: var(--code-bg);
  border: 2px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.3s;
  font-size: 14px;
  font-family: 'JetBrains Mono', monospace;
}

.mc-option:hover {
  border-color: var(--accent);
  background: var(--surface2);
}

.mc-option.selected {
  border-color: var(--accent);
  background: rgba(255, 107, 53, 0.1);
}

.mc-option.correct-answer {
  border-color: var(--green);
  background: var(--correct);
}

.mc-option.wrong-answer {
  border-color: var(--red);
  background: var(--wrong);
}

/* Navigation buttons */
.nav-buttons {
  display: flex;
  justify-content: space-between;
  margin-top: 40px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
}

.btn-nav {
  padding: 12px 32px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.3s;
  font-family: 'Noto Sans SC', sans-serif;
}

.btn-nav:hover {
  border-color: var(--accent);
  background: var(--surface2);
}

.btn-nav.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

.btn-nav.primary:hover {
  background: var(--accent2);
}

/* Responsive */
@media (max-width: 768px) {
  .nav { display: none; }
  .main { margin-left: 0; padding: 24px 20px 80px; }
  .progress-bar { width: 120px; }
}

/* Summary section */
.summary-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin: 16px 0;
}

.summary-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
}

.summary-card .card-title {
  font-size: 12px;
  color: var(--accent);
  font-weight: 700;
  letter-spacing: 1px;
  margin-bottom: 6px;
}

.summary-card .card-content {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--text-dim);
}

.final-score {
  text-align: center;
  padding: 40px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin: 24px 0;
}

.final-score .big-score {
  font-family: 'JetBrains Mono', monospace;
  font-size: 64px;
  font-weight: 900;
  color: var(--accent);
}

.final-score .score-label {
  font-size: 14px;
  color: var(--text-dim);
  margin-top: 8px;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">PYTHON 第二章 · 基础语法</div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="score-display">得分: <span id="totalScore">0</span> / <span id="maxScore">0</span></div>
</div>

<div class="nav" id="navPanel"></div>

<div class="main" id="mainContent"></div>

<script>
const sections = [
  {
    id: "literal",
    title: "字面量",
    number: "2-01",
    subtitle: "直接写在代码里的固定值",
    content: `
      <p>字面量就是<span class="highlight">直接写在代码里的固定值</span>。你看到什么就是什么，不需要计算。</p>
      <div class="analogy">就像你在SolidWorks里标注一个尺寸"50mm"，这个50就是字面量——它就是50，不需要经过任何计算。</div>
      <h3>常见的字面量类型</h3>
      <p><span class="highlight">整数（int）</span>：没有小数点的数</p>
      <div class="code-block"><span class="number">1</span>、<span class="number">100</span>、<span class="number">-5</span>、<span class="number">0</span></div>
      <p><span class="highlight">浮点数（float）</span>：有小数点的数</p>
      <div class="code-block"><span class="number">3.14</span>、<span class="number">0.99</span>、<span class="number">-5.5</span></div>
      <p><span class="highlight">字符串（string）</span>：用引号括起来的文字</p>
      <div class="code-block"><span class="string">"hello"</span>、<span class="string">'你好'</span>、<span class="string">"YLYJ"</span></div>
      <p><span class="highlight">布尔值（bool）</span>：只有两个值</p>
      <div class="code-block"><span class="keyword">True</span>、<span class="keyword">False</span></div>
      <p>你写PPO代码时的 <code>gamma=0.99</code>，那个 <code>0.99</code> 就是浮点数字面量；<code>last_adv = 0</code> 的 <code>0</code> 就是整数字面量。</p>
    `,
    exercises: [
      {
        type: "mc",
        question: "以下哪个是字符串字面量？",
        options: ["100", '"YLYJ"', "3.14", "True"],
        correct: 1,
        explanation: '字符串需要用引号括起来，"YLYJ"有引号所以是字符串。100是整数，3.14是浮点数，True是布尔值。'
      },
      {
        type: "mc",
        question: '<code>0.95</code> 是什么类型的字面量？',
        options: ["整数 int", "浮点数 float", "字符串 str", "布尔值 bool"],
        correct: 1,
        explanation: "有小数点的数就是浮点数（float）。你的lam=0.95就是浮点数。"
      }
    ]
  },
  {
    id: "comment",
    title: "注释",
    number: "2-02",
    subtitle: "写给人看的说明，Python会忽略它",
    content: `
      <p>注释就是<span class="highlight">写给人看的说明</span>，Python会完全忽略它，不会执行。</p>
      <div class="analogy">就像你在SolidWorks工程图里加的标注说明，不影响零件本身，但方便别人理解你的设计意图。</div>
      <h3>单行注释：用 #</h3>
      <div class="code-block"><span class="comment"># 这是一条注释</span>
<span class="var">a</span> <span class="op">=</span> <span class="number">5</span>  <span class="comment"># 也可以写在代码后面</span></div>
      <h3>多行注释：用三个引号</h3>
      <div class="code-block"><span class="string">"""
这是多行注释
可以写好几行
"""</span></div>
      <p>养成加注释的习惯，比如：</p>
      <div class="code-block"><span class="var">advantages</span> <span class="op">=</span> <span class="func">np.zeros</span>(<span class="func">len</span>(<span class="var">rewards</span>))  <span class="comment"># 创建空的评价结果表</span>
<span class="var">last_adv</span> <span class="op">=</span> <span class="number">0</span>  <span class="comment"># 接力棒从0开始</span></div>
    `,
    exercises: [
      {
        type: "mc",
        question: "Python中单行注释用什么符号开头？",
        options: ["//", "#", "/*", "--"],
        correct: 1,
        explanation: "Python用 # 开头表示单行注释。// 是C/Java的注释，/* 是C的多行注释，-- 是SQL的注释。"
      }
    ]
  },
  {
    id: "variable",
    title: "变量",
    number: "2-03",
    subtitle: "给一个值取个名字",
    content: `
      <p>变量就是<span class="highlight">给一个值取个名字</span>，方便你反复使用和修改。</p>
      <div class="analogy">就像你在SolidWorks里定义一个参数叫"连杆长度=80mm"，后面所有引用这个尺寸的地方都用这个名字。改了参数值，所有引用的地方自动更新。</div>
      <h3>赋值</h3>
      <div class="code-block"><span class="var">a</span> <span class="op">=</span> <span class="number">10</span>  <span class="comment"># 创建变量a，值为10</span>
<span class="var">gamma</span> <span class="op">=</span> <span class="number">0.99</span>  <span class="comment"># 创建变量gamma，值为0.99</span></div>
      <p><code>=</code> 不是"等于"，而是<span class="highlight">"赋值"</span>——把右边的值交给左边的名字。</p>
      <h3>变量可以覆盖</h3>
      <div class="code-block"><span class="var">last_adv</span> <span class="op">=</span> <span class="number">0</span>        <span class="comment"># 接力棒一开始是0</span>
<span class="var">last_adv</span> <span class="op">=</span> <span class="number">-5.5</span>     <span class="comment"># 算完第3步，覆盖成-5.5</span>
<span class="var">last_adv</span> <span class="op">=</span> <span class="number">-4.678</span>   <span class="comment"># 算完第2步，覆盖成-4.678</span></div>
      <h3>变量参与计算</h3>
      <div class="code-block"><span class="var">a</span> <span class="op">=</span> <span class="number">5</span>
<span class="var">b</span> <span class="op">=</span> <span class="number">3</span>
<span class="var">c</span> <span class="op">=</span> <span class="var">a</span> <span class="op">+</span> <span class="var">b</span>  <span class="comment"># c等于8</span></div>
    `,
    exercises: [
      {
        type: "input",
        question: '执行以下代码后，<code>x</code> 的值是多少？<div class="code-block"><span class="var">x</span> <span class="op">=</span> <span class="number">10</span>\n<span class="var">x</span> <span class="op">=</span> <span class="var">x</span> <span class="op">+</span> <span class="number">5</span>\n<span class="var">x</span> <span class="op">=</span> <span class="var">x</span> <span class="op">*</span> <span class="number">2</span></div>',
        answer: "30",
        explanation: "x先是10，然后x+5=15覆盖x，再x*2=30覆盖x。最终x=30。"
      },
      {
        type: "input",
        question: '执行以下代码后，<code>b</code> 的值是多少？<div class="code-block"><span class="var">a</span> <span class="op">=</span> <span class="number">3</span>\n<span class="var">b</span> <span class="op">=</span> <span class="var">a</span>\n<span class="var">a</span> <span class="op">=</span> <span class="number">7</span></div>',
        answer: "3",
        explanation: "b=a时，a是3，所以b变成3。后面a改成7，但b不会跟着变，b还是3。"
      }
    ]
  },
  {
    id: "datatype",
    title: "数据类型",
    number: "2-04",
    subtitle: "每个值都有自己的类型",
    content: `
      <p>Python里每个值都有一个<span class="highlight">"类型"</span>，决定了它能做什么操作。</p>
      <div class="analogy">就像你YLYJ项目里，电机ID是整数、连杆长度是小数、电机名称是文字。虽然都是数据，但性质不同。</div>
      <h3>四种常用类型</h3>
      <div class="code-block"><span class="func">int</span>     <span class="comment"># 整数：1, 100, -5</span>
<span class="func">float</span>   <span class="comment"># 浮点数：3.14, 0.99, -5.5</span>
<span class="func">str</span>     <span class="comment"># 字符串："hello", "YLYJ"</span>
<span class="func">bool</span>    <span class="comment"># 布尔：True, False</span></div>
      <h3>用 type() 查看类型</h3>
      <div class="code-block"><span class="func">print</span>(<span class="func">type</span>(<span class="number">10</span>))       <span class="comment"># &lt;class 'int'&gt;</span>
<span class="func">print</span>(<span class="func">type</span>(<span class="number">3.14</span>))     <span class="comment"># &lt;class 'float'&gt;</span>
<span class="func">print</span>(<span class="func">type</span>(<span class="string">"你好"</span>))    <span class="comment"># &lt;class 'str'&gt;</span>
<span class="func">print</span>(<span class="func">type</span>(<span class="keyword">True</span>))     <span class="comment"># &lt;class 'bool'&gt;</span></div>
      <p><span class="highlight">int和float混合计算，结果自动变成float</span>：</p>
      <div class="code-block"><span class="var">a</span> <span class="op">=</span> <span class="number">1</span> <span class="op">+</span> <span class="number">0.5</span>  <span class="comment"># a是1.5，类型是float</span></div>
    `,
    exercises: [
      {
        type: "mc",
        question: '<code>type(3 + 0.14)</code> 的结果是什么？',
        options: ["int", "float", "str", "bool"],
        correct: 1,
        explanation: "int和float混合计算，结果自动变成float。3+0.14=3.14，类型是float。"
      },
      {
        type: "mc",
        question: '<code>type("100")</code> 的结果是什么？',
        options: ["int", "float", "str", "bool"],
        correct: 2,
        explanation: '虽然内容看起来是数字，但它被引号括起来了，所以是字符串str。"100"和100是完全不同的东西。'
      }
    ]
  },
  {
    id: "conversion",
    title: "数据类型转换",
    number: "2-05",
    subtitle: "把一种类型变成另一种",
    content: `
      <p>有时候你需要把一种类型变成另一种，就像把整数尺寸改成精确小数。</p>
      <h3>三个转换函数</h3>
      <p><span class="highlight">int()</span> → 转成整数，小数直接砍掉：</p>
      <div class="code-block"><span class="func">int</span>(<span class="number">3.9</span>)     <span class="comment"># 3（不是四舍五入，是直接砍）</span>
<span class="func">int</span>(<span class="string">"10"</span>)    <span class="comment"># 10</span></div>

// State
let currentSection = 0;
let score = 0;
let answeredQuestions = new Set();
let completedSections = new Set();
let totalQuestions = 0;

// Count total questions
sections.forEach(s => { totalQuestions += s.exercises.length; });

function renderNav() {
  const nav = document.getElementById('navPanel');
  nav.innerHTML = sections.map((s, i) => `
    <div class="nav-item ${i === currentSection ? 'active' : ''}" onclick="goToSection(${i})">
      <span class="status ${completedSections.has(i) ? 'done' : ''}"></span>
      ${s.number} ${s.title}
    </div>
  `).join('');
}

function renderSection() {
  const s = sections[currentSection];
  const main = document.getElementById('mainContent');
  
  let exerciseHTML = s.exercises.map((ex, ei) => {
    const qid = `${currentSection}-${ei}`;
    const answered = answeredQuestions.has(qid);
    
    if (ex.type === 'mc') {
      return `
        <div class="exercise-box">
          <div class="exercise-label">练习 ${ei + 1}</div>
          <div class="exercise-question">${ex.question}</div>
          <div class="mc-options" id="mc-${qid}">
            ${ex.options.map((opt, oi) => `
              <div class="mc-option ${answered ? (oi === ex.correct ? 'correct-answer' : '') : ''}" 
                   onclick="checkMC('${qid}', ${oi}, ${ex.correct}, this)"
                   ${answered ? 'style="pointer-events:none"' : ''}>
                ${String.fromCharCode(65 + oi)}. ${opt}
              </div>
            `).join('')}
          </div>
          <div class="feedback" id="fb-${qid}"></div>
        </div>
      `;
    } else {
      return `
        <div class="exercise-box">
          <div class="exercise-label">练习 ${ei + 1}</div>
          <div class="exercise-question">${ex.question}</div>
          <input class="exercise-input" id="input-${qid}" placeholder="输入你的答案..." ${answered ? 'disabled' : ''}>
          <button class="btn-check" onclick="checkInput('${qid}', ${ei})" ${answered ? 'disabled style="opacity:0.5"' : ''}>提交答案</button>
          <div class="feedback" id="fb-${qid}"></div>
        </div>
      `;
    }
  }).join('');
  
  const prevBtn = currentSection > 0 ? `<button class="btn-nav" onclick="goToSection(${currentSection - 1})">← 上一节</button>` : '<div></div>';
  const nextBtn = currentSection < sections.length - 1 ? `<button class="btn-nav primary" onclick="goToSection(${currentSection + 1})">下一节 →</button>` : '<div></div>';
  
  main.innerHTML = `
    <div class="section active">
      <div class="section-number">${s.number}</div>
      <h2>${s.title}</h2>
      <div class="subtitle">${s.subtitle}</div>
      ${s.content}
      ${exerciseHTML}
      <div class="nav-buttons">
        ${prevBtn}
        ${nextBtn}
      </div>
    </div>
  `;
  
  // Restore answered state
  s.exercises.forEach((ex, ei) => {
    const qid = `${currentSection}-${ei}`;
    if (answeredQuestions.has(qid)) {
      const fb = document.getElementById(`fb-${qid}`);
      if (fb && fb.dataset.html) {
        fb.innerHTML = fb.dataset.html;
        fb.className = `feedback ${fb.dataset.cls}`;
      }
    }
  });
}

function checkMC(qid, selected, correct, el) {
  if (answeredQuestions.has(qid)) return;
  answeredQuestions.add(qid);
  
  const parts = qid.split('-');
  const si = parseInt(parts[0]);
  const ei = parseInt(parts[1]);
  const ex = sections[si].exercises[ei];
  
  const container = document.getElementById(`mc-${qid}`);
  const options = container.querySelectorAll('.mc-option');
  options.forEach((opt, i) => {
    opt.style.pointerEvents = 'none';
    if (i === correct) opt.classList.add('correct-answer');
    if (i === selected && i !== correct) opt.classList.add('wrong-answer');
  });
  
  const fb = document.getElementById(`fb-${qid}`);
  const isCorrect = selected === correct;
  if (isCorrect) {
    score++;
    fb.innerHTML = `✅ 正确！${ex.explanation}`;
    fb.className = 'feedback correct';
  } else {
    fb.innerHTML = `❌ 错误。${ex.explanation}`;
    fb.className = 'feedback wrong';
  }
  fb.dataset.html = fb.innerHTML;
  fb.dataset.cls = isCorrect ? 'correct' : 'wrong';
  
  updateProgress();
  checkSectionComplete();
}

function checkInput(qid, ei) {
  if (answeredQuestions.has(qid)) return;
  
  const parts = qid.split('-');
  const si = parseInt(parts[0]);
  const ex = sections[si].exercises[ei];
  
  const input = document.getElementById(`input-${qid}`);
  const userAnswer = input.value.trim();
  
  if (!userAnswer) return;
  
  answeredQuestions.add(qid);
  input.disabled = true;
  
  const fb = document.getElementById(`fb-${qid}`);
  const allAnswers = [ex.answer, ...(ex.altAnswers || [])];
  const isCorrect = allAnswers.some(a => userAnswer === a || userAnswer.toLowerCase() === a.toLowerCase());
  
  if (isCorrect) {
    score++;
    fb.innerHTML = `✅ 正确！${ex.explanation}`;
    fb.className = 'feedback correct';
  } else {
    fb.innerHTML = `❌ 错误。${ex.explanation}<div class="answer-reveal">正确答案：${ex.answer}</div>`;
    fb.className = 'feedback wrong';
  }
  fb.dataset.html = fb.innerHTML;
  fb.dataset.cls = isCorrect ? 'correct' : 'wrong';
  
  const btn = fb.previousElementSibling;
  if (btn) { btn.disabled = true; btn.style.opacity = '0.5'; }
  
  updateProgress();
  checkSectionComplete();
}

function checkSectionComplete() {
  const s = sections[currentSection];
  const allDone = s.exercises.every((_, ei) => answeredQuestions.has(`${currentSection}-${ei}`));
  if (allDone) {
    completedSections.add(currentSection);
    renderNav();
  }
}

function updateProgress() {
  document.getElementById('totalScore').textContent = score;
  document.getElementById('maxScore').textContent = totalQuestions;
  const pct = totalQuestions > 0 ? (answeredQuestions.size / totalQuestions * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
}

function goToSection(i) {
  currentSection = i;
  renderNav();
  renderSection();
  window.scrollTo(0, 0);
}

// Init
renderNav();
renderSection();
updateProgress();
</script>
</body>
</html>
