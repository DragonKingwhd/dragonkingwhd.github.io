<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python 学习 - 章节目录</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface2: #1a1a25;
  --border: #2a2a3a;
  --text: #e8e6f0;
  --text-dim: #8888a0;
  --accent: #ff6b35;
  --accent2: #ff9a5c;
  --green: #4ecdc4;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans SC', sans-serif;
  line-height: 1.8;
  min-height: 100vh;
  padding: 60px 24px;
}
.container { max-width: 880px; margin: 0 auto; }
.page-title {
  font-size: 36px; font-weight: 900; letter-spacing: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 12px;
}
.page-sub { color: var(--text-dim); margin-bottom: 40px; font-size: 15px; }
.chapters { display: grid; gap: 20px; }
.chapter-card {
  display: block;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px 32px;
  text-decoration: none;
  color: inherit;
  transition: all 0.25s ease;
  position: relative;
  overflow: hidden;
}
.chapter-card:hover {
  border-color: var(--accent);
  transform: translateY(-3px);
  box-shadow: 0 12px 32px rgba(255, 107, 53, 0.15);
}
.chapter-card::before {
  content: "";
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 4px; background: linear-gradient(180deg, var(--accent), var(--accent2));
  opacity: 0; transition: opacity 0.25s;
}
.chapter-card:hover::before { opacity: 1; }
.chapter-num {
  font-family: 'JetBrains Mono', monospace;
  color: var(--accent); font-size: 13px; font-weight: 700;
  letter-spacing: 2px; margin-bottom: 6px;
}
.chapter-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.chapter-desc { color: var(--text-dim); font-size: 14px; }
.chapter-arrow {
  position: absolute; right: 32px; top: 50%; transform: translateY(-50%);
  color: var(--text-dim); font-size: 24px; transition: all 0.25s;
}
.chapter-card:hover .chapter-arrow {
  color: var(--accent); transform: translateY(-50%) translateX(4px);
}
.footer-note {
  margin-top: 40px; text-align: center; color: var(--text-dim); font-size: 13px;
}
.back-link {
  display: inline-block; margin-bottom: 28px; color: var(--text-dim);
  text-decoration: none; font-size: 14px; transition: color 0.2s;
}
.back-link:hover { color: var(--accent); }
</style>
</head>
<body>
<div class="container">
  <a href="/tools/" class="back-link">← 返回工具集</a>
  <h1 class="page-title">PYTHON 学习</h1>
  <p class="page-sub">交互式章节学习页面 · 包含讲解、随堂练习与进度追踪</p>

  <div class="chapters">
    <a href="chapter2.html" class="chapter-card">
      <div class="chapter-num">CHAPTER 02</div>
      <div class="chapter-title">基础语法</div>
      <div class="chapter-desc">变量、数据类型、运算符、字符串格式化（f-string）与综合测试</div>
      <div class="chapter-arrow">→</div>
    </a>

    <a href="chapter3.html" class="chapter-card">
      <div class="chapter-num">CHAPTER 03</div>
      <div class="chapter-title">判断语句</div>
      <div class="chapter-desc">布尔类型、比较运算符、if / elif / else 以及嵌套判断</div>
      <div class="chapter-arrow">→</div>
    </a>
  </div>

  <p class="footer-note">更多章节持续更新中 ✦</p>
</div>
</body>
</html>
