<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python 学习 · 章节目录</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ffffff;
  --surface: #fafbfc;
  --border: #e5e7eb;
  --border-soft: #eef0f3;
  --text: #1f2328;
  --text-soft: #4b5563;
  --text-dim: #6b7280;
  --accent: #e85d26;
  --accent2: #c2410c;
  --accent-soft: #fff4ed;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", 'Noto Sans SC', sans-serif;
  line-height: 1.8;
  min-height: 100vh;
  padding: 72px 24px 60px;
  -webkit-font-smoothing: antialiased;
}
.container { max-width: 820px; margin: 0 auto; }
.back-link {
  display: inline-flex; align-items: center; gap: 6px;
  margin-bottom: 24px; color: var(--text-dim);
  text-decoration: none; font-size: 14px; transition: color 0.2s;
}
.back-link:hover { color: var(--accent); }
.eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; font-weight: 600;
  color: var(--accent); letter-spacing: 2px;
  margin-bottom: 8px;
}
.page-title {
  font-size: 40px; font-weight: 800; letter-spacing: -1px;
  color: var(--text); margin-bottom: 12px;
}
.page-sub { color: var(--text-dim); margin-bottom: 44px; font-size: 15px; }
.chapters { display: grid; gap: 16px; }
.chapter-card {
  display: block;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px 28px;
  text-decoration: none;
  color: inherit;
  transition: all 0.2s ease;
  position: relative;
}
.chapter-card:hover {
  border-color: var(--accent);
  box-shadow: 0 6px 20px rgba(232, 93, 38, 0.10);
  transform: translateY(-2px);
}
.chapter-num {
  font-family: 'JetBrains Mono', monospace;
  color: var(--accent); font-size: 12px; font-weight: 700;
  letter-spacing: 2px; margin-bottom: 6px;
}
.chapter-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; color: var(--text); }
.chapter-desc { color: var(--text-soft); font-size: 14px; }
.chapter-arrow {
  position: absolute; right: 28px; top: 50%; transform: translateY(-50%);
  color: var(--text-dim); font-size: 22px; transition: all 0.2s;
}
.chapter-card:hover .chapter-arrow {
  color: var(--accent); transform: translateY(-50%) translateX(4px);
}
.footer-note {
  margin-top: 40px; text-align: center; color: var(--text-dim); font-size: 13px;
}
</style>
</head>
<body>
<div class="container">
  <a href="/tools/" class="back-link">← 返回工具集</a>
  <div class="eyebrow">PYTHON · 交互式学习</div>
  <h1 class="page-title">Python 学习</h1>
  <p class="page-sub">按章节组织的交互式页面 · 讲解、随堂练习与进度追踪</p>

  <div class="chapters">
    <a href="chapter2.html" class="chapter-card">
      <div class="chapter-num">CHAPTER 02</div>
      <div class="chapter-title">基础语法</div>
      <div class="chapter-desc">变量、数据类型、运算符、字符串格式化（f-string）与综合测试</div>
      <div class="chapter-arrow">→</div>
    </a>

    <a href="chapter3.html" class="chapter-card">
      <div class="chapter-num">CHAPTER 03</div>
      <div class="chapter-title">判断语句</div>
      <div class="chapter-desc">布尔类型、比较运算符、if / elif / else 以及嵌套判断</div>
      <div class="chapter-arrow">→</div>
    </a>
  </div>

  <p class="footer-note">更多章节持续更新中</p>
</div>
</body>
</html>
