{% if site.giscus.enable %}
<div class="comments-section">
    <div class="comments-header">
        <h3><i class="fas fa-comments"></i> 评论区</h3>
        <p>使用 GitHub 账号登录后即可评论（由 GitHub Discussions 驱动）</p>
    </div>
    <script src="https://giscus.app/client.js"
        data-repo="{{ site.giscus.repo }}"
        data-repo-id="{{ site.giscus.repo_id }}"
        data-category="{{ site.giscus.category }}"
        data-category-id="{{ site.giscus.category_id }}"
        data-mapping="{{ site.giscus.mapping | default: 'pathname' }}"
        data-strict="0"
        data-reactions-enabled="{{ site.giscus.reactions_enabled | default: '1' }}"
        data-emit-metadata="0"
        data-input-position="top"
        data-theme="{{ site.giscus.theme | default: 'light' }}"
        data-lang="{{ site.giscus.lang | default: 'zh-CN' }}"
        data-loading="lazy"
        crossorigin="anonymous"
        async>
    </script>
</div>
{% endif %}
